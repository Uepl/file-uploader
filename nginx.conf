events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name file-uploader-in-dierl.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name file-uploader-in-dierl.duckdns.org;

        # SSL Certificates (Managed by Certbot outside or via volume)
        ssl_certificate /etc/letsencrypt/live/file-uploader-in-dierl.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/file-uploader-in-dierl.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Frontend Static Files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API Proxy
        location /api/ {
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Crucial for large file uploads to GCS
            client_max_body_size 100M;
            proxy_read_timeout 300s;
        }
    }
}