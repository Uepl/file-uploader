events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    # This 'map' block is the pro way to handle the Upgrade header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name file-uploader-in-dierl.duckdns.org localhost; # localhost for dev

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Block only the registration endpoint
        location = /api/auth/register {
            deny all;
            return 403;
        }
        
        location /api/ {
            proxy_pass http://gateway:3000;
            proxy_http_version 1.1; # Required for Upgrade
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Standard Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Upload Optimizations
            client_max_body_size 100M; 
            proxy_read_timeout 300s;
        }
    }

    # server {
    #     listen 443 ssl;
    #     server_name file-uploader-in-dierl.duckdns.org;
    #
    #     ssl_certificate /etc/letsencrypt/live/file-uploader-in-dierl.duckdns.org/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/file-uploader-in-dierl.duckdns.org/privkey.pem;
    # }
}