events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name yourname.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/yourname.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourname.duckdns.org/privkey.pem;
        
        # 1. Serve the Frontend (SPA)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location ^~ /api/auth/register {
            deny all; 
            return 403; # Explicitly send Forbidden
        }

        # 2. Proxy API requests to the Node.js container
        location /api/ {
            proxy_pass http://api:3000; # 'api' is the name in docker-compose
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Allow large file uploads
            client_max_body_size 50M;
        }
    }
}