# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name file-uploader-in-dierl.duckdns.org;
    return 301 https://$host$request_uri;
}

# The Secure Server
server {
    listen 443 ssl;
    server_name file-uploader-in-dierl.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/file-uploader-in-dierl.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/file-uploader-in-dierl.duckdns.org/privkey.pem;

    # Optimal SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Block Register
    location ^~ /api/auth/register {
        deny all;
        return 403;
    }

    # 3. API Proxy
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}