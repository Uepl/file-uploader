
services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    env_file: .env
    environment:
      - SUBDOMAINS=file-uploader-in-dierl
      - TOKEN=${DUCKDNS_TOKEN}
    restart: always

  api:
    build:
      context: .
      target: server
    container_name: uploader-api
    volumes:
      - ./log:/app/logs
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      target: static-site 
    container_name: uploader-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/letsencrypt:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always

  redis:
    image: redis:7-alpine
    container_name: uploader-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes