
services:
  # Your Full-Stack API
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always

  # Reverse Proxy (Shows you know networking!)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - api