
services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - SUBDOMAINS=file-uploader-in-dierl
      - TOKEN=${DUCKDNS_TOKEN}
    restart: always
      
  # Your Full-Stack API
  api:
    build:
      context: .
      target: server
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always

  # Reverse Proxy (Shows you know networking!)
  nginx:
    build:
      context: .
      target: static-site 
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/letsencrypt:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

volumes:
  certs: