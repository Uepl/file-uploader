
services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    env_file: .env
    environment:
      - SUBDOMAINS=file-uploader-in-dierl
      - TOKEN=${DUCKDNS_TOKEN}
    restart: always

  api:
    build:
      context: .
      target: server
    container_name: uploader-api
    volumes:
      - ./log:/app/logs
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  nginx:
    build:
      context: .
      target: static-site 
    container_name: uploader-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/letsencrypt:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

  redis:
    image: redis:7-alpine
    container_name: uploader-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes