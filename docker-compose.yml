
services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    env_file: .env
    environment:
      - SUBDOMAINS=file-uploader-in-dierl
      - TOKEN=${DUCKDNS_TOKEN}
    restart: always

  gateway:
    build:
      context: .
      target: gateway
    container_name: uploader-gateway
    ports:
      - "3000:3000"
    restart: always
    env_file: .env
    depends_on:
      auth-service:
        condition: service_healthy
      file-service:
        condition: service_healthy

  auth-service:
    build:
      context: .
      target: auth-service
    container_name: uploader-auth
    restart: always
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  file-service:
    build:
      context: .
      target: file-service
    container_name: uploader-file
    restart: always
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3002 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    container_name: uploader-worker
    restart: always
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      target: static-site 
    container_name: uploader-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/letsencrypt:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_started
    restart: always

  redis:
    image: redis:7-alpine
    container_name: uploader-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  redis_data: