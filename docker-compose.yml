
services:
  # Your Full-Stack API
  api:
    build:
      context: .
      target: server
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always

  # Reverse Proxy (Shows you know networking!)
  nginx:
    build:
      context: .
      target: static-site 
    ports:
      - "80:80"
    depends_on:
      - api