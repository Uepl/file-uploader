
services:
  # Your Full-Stack API
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY} # Passed from a .env file
      - PORT=3000
      - STORAGE_PATH=/app/storage
    volumes:
      - ./encrypted_storage:/app/storage # Where the files live
    restart: always

  # Reverse Proxy (Shows you know networking!)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api