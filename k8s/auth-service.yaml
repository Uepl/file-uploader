apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: file-uploader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: kind-registry:5000/uploader-auth:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: AUTH_SERVICE_PORT
          value: "3001"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: JWT_SECRET
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_PROJECT_ID
        - name: FIREBASE_CLIENT_EMAIL
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_CLIENT_EMAIL
        - name: FIREBASE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_PRIVATE_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: file-uploader
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: auth-service
