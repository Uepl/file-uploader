apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: file-uploader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
      - name: file-service
        image: kind-registry:5000/uploader-file:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        env:
        - name: FILE_SERVICE_PORT
          value: "3002"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: GCS_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: GCS_BUCKET_NAME
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: JWT_SECRET
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_PROJECT_ID
        - name: FIREBASE_CLIENT_EMAIL
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_CLIENT_EMAIL
        - name: FIREBASE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_PRIVATE_KEY
        - name: PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: PRIVATE_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: file-service
  namespace: file-uploader
spec:
  ports:
  - port: 3002
    targetPort: 3002
  selector:
    app: file-service
