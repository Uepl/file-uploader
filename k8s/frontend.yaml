apiVersion: apps/v1
kind: Deployment
metadata:
  name: uploader-frontend
  namespace: file-uploader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uploader-frontend
  template:
    metadata:
      labels:
        app: uploader-frontend
    spec:
      containers:
      - name: uploader-frontend
        image: kind-registry:5000/uploader-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: uploader-frontend
  namespace: file-uploader
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: uploader-frontend
