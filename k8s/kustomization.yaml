apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: file-uploader

resources:
- namespace.yaml
- redis.yaml
- gateway.yaml
- auth-service.yaml
- file-service.yaml
- worker.yaml
- frontend.yaml
- ingress.yaml
- error-service.yaml

secretGenerator:
- name: uploader-secrets
  envs:
  - ../.env

# This prevents Kustomize from adding a random hash to the secret name, 
# which makes it easier to reference in your api.yaml Deployment.
generatorOptions:
  disableNameSuffixHash: true
