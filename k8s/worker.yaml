apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: file-uploader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: kind-registry:5000/uploader-worker:latest
        imagePullPolicy: Always
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: GCS_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: GCS_BUCKET_NAME
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_PROJECT_ID
        - name: FIREBASE_CLIENT_EMAIL
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_CLIENT_EMAIL
        - name: FIREBASE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: uploader-secrets
              key: FIREBASE_PRIVATE_KEY
